apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bertgateway-httproute
spec:
  parentRefs:
  - name: bertgateway
  hostnames:
  - webserver.bert
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: webserver
      port: 80
