apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: bertinx
  template:
    metadata:
      labels:
        app: bertinx
    spec:
      containers:
      - name: nginx
        image: nginx:1.26
        ports:
        - containerPort: 80